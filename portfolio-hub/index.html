<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Tất Chí Thành</title>
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/hub.css">
</head>
<body>
    <header class="hub-header">
        <div class="container">
            <div class="logo">Thành Tất</div>
            <nav>
                <a href="#about">Giới thiệu</a>
                <a href="#goals">Mục tiêu</a>
                <a href="#skills">Kỹ năng</a>
                <a href="#experience">Kinh nghiệm</a>
                <a href="#education">Học vấn</a>
                <a href="#projects">Dự án</a>
            </nav>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero" class="hero-section">
            <div class="container">
                <div class="hero-content" id="hero-container">
                    <!-- JS Injected: Name, Title, Tagline, Contacts -->
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about-section">
            <div class="container">
                <h2 class="section-title">Lời giới thiệu</h2>
                <div id="about-container" class="card" style="font-size: 1.1rem; line-height: 1.8; max-width: 860px; margin: 0 auto;">
                    <!-- JS Injected: Introducing -->
                </div>
            </div>
        </section>

        <!-- Career Goals Section -->
        <section id="goals" class="about-section bg-light">
            <div class="container">
                <h2 class="section-title">Mục Tiêu Nghề Nghiệp</h2>
                <div id="goals-container">
                    <!-- JS Injected: Short-term and Long-term goals -->
                </div>
            </div>
        </section>

        <!-- Skills Section -->
        <section id="skills" class="skills-section">
            <div class="container">
                <h2 class="section-title">Năng Lực Chuyên Môn</h2>
                <div id="skills-container" style="display: flex; flex-direction: column; gap: 32px;">
                    <!-- JS Injected: Hard Skills and Soft Skills -->
                </div>
            </div>
        </section>

        <!-- Experience Section -->
        <section id="experience" class="experience-section">
            <div class="container">
                <h2 class="section-title">Kinh Nghiệm Làm Việc</h2>
                <div class="grid-2" id="experience-container">
                    <!-- JS Injected: timeline cards -->
                </div>
            </div>
        </section>

        <!-- Education & Certifications Section -->
        <section id="education" class="education-section bg-light">
            <div class="container">
                <h2 class="section-title">Học Vấn & Chứng Chỉ</h2>
                <div id="education-container" class="grid-2">
                    <!-- JS Injected: Education details and Certifications list -->
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="projects-section">
            <div class="container">
                <h2 class="section-title">Dự Án Nổi Bật</h2>
                <div class="projects-grid" id="projects-container">
                    <!-- JS Injected: project cards -->
                </div>
            </div>
        </section>
    </main>

    <footer class="hub-footer">
        <div class="container">
            <p>&copy; 2026 Tất Chí Thành. Thiết kế và nội dung dựa trên cấu trúc Hub-Nodes.</p>
        </div>
    </footer>

    <!-- JS Files -->
    <script src="js/config.js"></script>
    <script src="js/sheet-loader.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/hub.js"></script>
</body>
</html>
